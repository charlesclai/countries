<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ Endless Geography Trivia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    
    <style>
        body { background-color: #FEFDF0; color: #2D2A1E; }
        .pub-card { background: #FFFDEB; border: 1px solid #EFE9B0; }
        .brand-gold-bg { background-color: #F8E665; }
        .pub-input:focus { outline: none; border-color: #C09918; box-shadow: 0 0 0 2px rgba(192, 153, 24, 0.2); }
        .country-feature { fill: #E2E8F0; stroke: #94A3B8; stroke-width: 0.5; transition: all 0.3s ease; }
        .country-target { fill: #F8E665 !important; stroke: #C09918 !important; stroke-width: 1.5; filter: drop-shadow(0px 0px 8px rgba(192, 153, 24, 0.7)); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between font-sans antialiased selection:bg-[#F8E665] selection:text-slate-900">

    <header class="border-b border-[#EFE9B0] bg-[#FFFDEB]/90 backdrop-blur sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="h-9 w-9 rounded-xl brand-gold-bg flex items-center justify-center shadow-md shadow-[#F8E665]/20">
                    <i class="fas fa-map-location-dot text-slate-900 text-lg"></i>
                </div>
                <div>
                    <h1 class="text-base font-black tracking-tight text-slate-900 uppercase">Charles's Geeks Who Drink</h1>
                    <p class="text-[10px] font-bold text-amber-900 uppercase tracking-widest">Geography Edition</p>
                </div>
            </div>
            <div class="flex items-center space-x-2 bg-slate-900/5 px-3 py-1.5 rounded-xl border border-[#EFE9B0]">
                <i class="fas fa-fire text-amber-600 text-xs animate-pulse"></i>
                <span id="streak-counter" class="text-xs font-black tracking-wider text-slate-700 tabular-nums">STREAK: 0</span>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-xl">
            <div class="pub-card rounded-2xl p-6 sm:p-8 shadow-xl relative overflow-hidden backdrop-blur-md">
                <div class="flex flex-col items-center text-center space-y-4 pb-6 border-b border-[#EFE9B0]">
                    <div class="w-full h-72 bg-sky-100 rounded-xl relative border border-[#EFE9B0] flex items-center justify-center overflow-hidden shadow-inner">
                        <div id="map-loading" class="absolute inset-0 flex flex-col items-center justify-center bg-[#FFFDEB]/80 z-10 transition-opacity duration-300">
                            <i class="fas fa-spinner fa-spin text-amber-600 text-2xl mb-2"></i>
                            <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Normalizing Global Data...</span>
                        </div>
                        <svg id="geo-map-svg" class="w-full h-full"></svg>
                    </div>
                    <button id="hint-toggle-btn" class="text-[11px] font-black uppercase text-amber-700 tracking-wider hover:underline flex items-center gap-1">
                        <i class="fas fa-eye text-[10px]"></i> Reveal Multiple Choice (-50% streak penalty)
                    </button>
                    <div id="choices-container" class="hidden grid grid-cols-2 gap-2 w-full pt-2"></div>
                </div>

                <div class="space-y-5 pt-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-600 uppercase tracking-wider block" for="input-country">Country or Territory</label>
                        <input id="input-country" autocomplete="off" type="text" placeholder="What landmass is highlighted in gold?" 
                               class="pub-input w-full px-4 py-3 bg-white border border-[#EFE9B0] rounded-xl text-slate-900 placeholder-slate-400 transition-colors duration-200">
                    </div>
                </div>

                <div id="feedback-drawer" class="hidden mt-6 pt-5 border-t border-[#EFE9B0] text-center"></div>

                <div class="flex items-center justify-end gap-4 pt-6 mt-6 border-t border-[#EFE9B0]">
                    <button id="submit-btn" class="px-6 py-3 rounded-xl bg-amber-600 text-white font-black text-xs uppercase tracking-wider flex items-center space-x-2 transition-all hover:bg-amber-500 shadow-lg shadow-amber-600/10">
                        <span>Submit</span> <i class="fas fa-map-pin text-xs"></i>
                    </button>
                    <button id="next-btn" class="hidden px-6 py-3 rounded-xl bg-slate-800 text-white font-black text-xs uppercase tracking-wider flex items-center space-x-2 transition-all hover:bg-slate-700 shadow-lg shadow-slate-900/10">
                        <span>Next Country</span> <i class="fas fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const quizTargetsList = [
            "Afghanistan", "Albania", "Algeria", "Angola", "Argentina", "Armenia", "Australia", "Austria", "Azerbaijan", "Bahamas",
            "Bangladesh", "Belarus", "Belgium", "Belize", "Benin", "Bhutan", "Bolivia", "Bosnia and Herzegovina", "Botswana", 
            "Bulgaria", "Burkina Faso", "Burundi", "Cambodia", "Cameroon", "Central African Republic", "Chad", "Chile",
            "Colombia", "Congo", "Costa Rica", "Cote d'Ivoire", "Croatia", "Cuba", "Cyprus", "Czech Republic", "Democratic Republic of the Congo",
            "Denmark", "Djibouti", "Dominican Republic", "Ecuador", "Egypt", "El Salvador", "Equatorial Guinea", "Eritrea", "Estonia",
            "Eswatini", "Ethiopia", "Finland", "France", "Gabon", "Gambia", "Georgia", "Germany", "Ghana", "Greece", "Guatemala",
            "Guinea", "Guyana", "Haiti", "Honduras", "Hungary", "Iceland", "India", "Indonesia", "Iran", "Iraq", "Ireland", "Israel",
            "Italy", "Jamaica", "Japan", "Jordan", "Kazakhstan", "Kenya", "Kuwait", "Kyrgyzstan", "Laos", "Latvia", "Lebanon",
            "Lesotho", "Liberia", "Libya", "Lithuania", "Luxembourg", "Madagascar", "Malawi", "Malaysia", "Mali", "Mauritania",
            "Mexico", "Moldova", "Mongolia", "Montenegro", "Morocco", "Mozambique", "Myanmar", "Namibia", "Nepal", "Netherlands",
            "New Zealand", "Nicaragua", "Niger", "Nigeria", "North Korea", "North Macedonia", "Norway", "Oman", "Pakistan", "Panama",
            "Papua New Guinea", "Paraguay", "Peru", "Philippines", "Poland", "Portugal", "Qatar", "Romania", "Rwanda", "Saudi Arabia",
            "Senegal", "Serbia", "Sierra Leone", "Singapore", "Slovakia", "Slovenia", "Somalia", "South Africa", "South Korea",
            "South Sudan", "Spain", "Sri Lanka", "Sudan", "Suriname", "Sweden", "Switzerland", "Syria", "Taiwan", "Tajikistan",
            "Tanzania", "Thailand", "Togo", "Trinidad and Tobago", "Tunisia", "Turkey", "Turkmenistan", "Uganda", "Ukraine",
            "United Arab Emirates", "United Kingdom", "United States", "Uruguay", "Uzbekistan", "Venezuela", "Vietnam", "Yemen",
            "Zambia", "Zimbabwe", "Alaska", "Hawaii", "French Guiana"
        ];

        let geoWorldData = [];          
        let quizCountryPool = [];       
        let currentCountryFeature = null;
        let currentStreak = 0;
        let hintPenaltyTriggered = false;
        let queryHistory = [];

        const svg = d3.select("#geo-map-svg");
        const hintToggleBtn = document.getElementById('hint-toggle-btn');
        const choicesContainer = document.getElementById('choices-container');
        const inputCountry = document.getElementById('input-country');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        const feedbackDrawer = document.getElementById('feedback-drawer');
        const streakCounter = document.getElementById('streak-counter');
        const loader = document.getElementById('map-loading');

        const width = 512;
        const height = 288;
        const projection = d3.geoMercator();
        const pathGenerator = d3.geoPath().projection(projection);

        d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(topology => {
            let baseFeatures = topojson.feature(topology, topology.objects.countries).features;
            let processedFeatures = [];
            let uniqueIdCounter = 0;
            let maxAreaRegistry = {};

            baseFeatures.forEach(feature => {
                if (feature.geometry.type === "MultiPolygon") {
                    feature.geometry.coordinates.forEach((polygonCoords) => {
                        uniqueIdCounter++;
                        let standaloneFeature = {
                            type: "Feature",
                            id: `split_geo_${uniqueIdCounter}`,
                            properties: { ...feature.properties },
                            geometry: { type: "Polygon", coordinates: polygonCoords }
                        };

                        let center = d3.geoCentroid(standaloneFeature);
                        let lon = center[0], lat = center[1];

                        if (feature.properties.name === "France" && lon < -50 && lat < 10) {
                            standaloneFeature.properties.name = "French Guiana";
                        } else if (feature.properties.name === "United States" && lon < -140 && lat > 50) {
                            standaloneFeature.properties.name = "Alaska";
                        } else if (feature.properties.name === "United States" && lon < -154 && lat < 30) {
                            standaloneFeature.properties.name = "Hawaii";
                        }

                        let area = d3.geoArea(standaloneFeature);
                        standaloneFeature.calculatedArea = area;
                        processedFeatures.push(standaloneFeature);

                        let name = standaloneFeature.properties.name;
                        if (!maxAreaRegistry[name] || area > maxAreaRegistry[name]) {
                            maxAreaRegistry[name] = area;
                        }
                    });
                } else {
                    uniqueIdCounter++;
                    feature.id = `split_geo_${uniqueIdCounter}`;
                    let area = d3.geoArea(feature);
                    feature.calculatedArea = area;
                    processedFeatures.push(feature);
                    maxAreaRegistry[feature.properties.name] = area;
                }
            });

            geoWorldData = processedFeatures;
            quizCountryPool = geoWorldData.filter(d => 
                quizTargetsList.includes(d.properties.name) && 
                d.calculatedArea === maxAreaRegistry[d.properties.name]
            );
            
            loader.style.opacity = 0;
            setTimeout(() => loader.remove(), 300);
            loadNextMapTarget();
        });

        function loadNextMapTarget() {
            inputCountry.value = "";
            inputCountry.disabled = false;
            hintPenaltyTriggered = false;
            feedbackDrawer.classList.add('hidden');
            choicesContainer.classList.add('hidden');
            hintToggleBtn.classList.remove('hidden');
            submitBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');

            let viablePool = quizCountryPool.filter(item => !queryHistory.includes(item.id));
            if (viablePool.length === 0) {
                queryHistory = [];
                viablePool = [...quizCountryPool];
            }

            currentCountryFeature = viablePool[Math.floor(Math.random() * viablePool.length)];
            queryHistory.push(currentCountryFeature.id);
            renderVisualProjection();
        }

        function renderVisualProjection() {
            svg.selectAll("*").remove();

            projection.scale(1).translate([0, 0]);
            const b = pathGenerator.bounds(currentCountryFeature);
            
            const zoomOverrides = {
                "Argentina": 0.5, "Finland": 0.9, "Sweden": 0.9, "Israel": 1.5, "Norway": 0.9,
                "South Africa": 0.4, "Peru": 0.5, "Vietnam": 0.6, "Thailand": 0.6, "Mexico": 0.3,
                "Australia": 0.2, "Kazakhstan": 0.5, "Japan": 0.4, "United Kingdom": 0.5, "Italy": 0.9,
                "India": 0.7, "Iran": 0.5, "Saudi Arabia": 0.7, "Myanmar": 0.6, "Algeria": 0.4
            };
            
            const name = currentCountryFeature.properties.name;
            const customScale = zoomOverrides[name] || 0.06;
            
            const s = customScale / Math.max((b[1][0] - b[0][0]) / width, (b[1][1] - b[0][1]) / height);
            const t = [
                (width - s * (b[1][0] + b[0][0])) / 2,
                (height - s * (b[1][1] + b[0][1])) / 2
            ];

            projection.scale(s).translate(t);

            svg.append("g").selectAll("path")
               .data(geoWorldData)
               .enter().append("path")
               .attr("d", pathGenerator)
               .attr("class", d => d.properties.name === currentCountryFeature.properties.name ? "country-feature country-target" : "country-feature");
        }

        function evaluateResponse() {
            const userAns = inputCountry.value.toLowerCase().replace(/[^a-z0-9]/g, "").trim();
            const correctName = currentCountryFeature.properties.name;
            const targetAns = correctName.toLowerCase().replace(/[^a-z0-9]/g, "").trim();
            
            const aliases = {
                "cotedivoire": ["cotedivoire", "ivorycoast"],
                "democraticrepublicofthecongo": ["democraticrepublicofthecongo", "drcongo", "drc"]
            };

            let isCorrect = (userAns === targetAns);
            if (aliases[targetAns] && aliases[targetAns].includes(userAns)) {
                isCorrect = true;
            }

            currentStreak = isCorrect ? (hintPenaltyTriggered ? Math.floor(currentStreak / 2) + 1 : currentStreak + 1) : 0;
            streakCounter.innerText = `STREAK: ${currentStreak}`;
            feedbackDrawer.innerHTML = `<div class="py-2.5 px-4 rounded-xl font-bold inline-block mx-auto text-sm ${isCorrect ? 'bg-emerald-100 text-emerald-900 border border-emerald-300' : 'bg-rose-100 text-rose-900 border border-rose-300'}">${correctName}</div>`;
            feedbackDrawer.classList.remove('hidden');
            inputCountry.disabled = true; hintToggleBtn.classList.add('hidden');
            choicesContainer.classList.add('hidden'); 
            submitBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
        }

        function triggerChoicesHelp() {
            hintPenaltyTriggered = true;
            hintToggleBtn.classList.add('hidden');
            choicesContainer.classList.remove('hidden');
            let list = [currentCountryFeature.properties.name];
            let altPool = quizCountryPool.filter(d => d.properties.name !== currentCountryFeature.properties.name);
            while (list.length < 4) {
                let rngName = altPool[Math.floor(Math.random() * altPool.length)].properties.name;
                if (!list.includes(rngName)) list.push(rngName);
            }
            list.sort(() => Math.random() - 0.5);
            choicesContainer.innerHTML = "";
            list.forEach(item => {
                const button = document.createElement("button");
                button.className = "p-2.5 text-xs font-bold text-slate-800 bg-white border border-[#EFE9B0] rounded-xl hover:bg-[#F8E665]/30 transition text-left truncate";
                button.innerText = item;
                button.onclick = () => { inputCountry.value = item; evaluateResponse(); };
                choicesContainer.appendChild(button);
            });
        }

        submitBtn.addEventListener('click', evaluateResponse);
        nextBtn.addEventListener('click', loadNextMapTarget);
        hintToggleBtn.addEventListener('click', triggerChoicesHelp);
        inputCountry.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !submitBtn.classList.contains('hidden')) evaluateResponse(); });
    </script>
</body>
</html>
